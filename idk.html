<!DOCTYPE html>
<html>
<head>
  <title>REGICIDE Park</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(to top, #87ceeb 0%, #e0f6ff 100%);
    }

    #ground {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 60%;
      background: url('assets/grass.png');
      background-size: 400px 400px;
      background-repeat: repeat;
    }

    .tree {
      position: absolute;
      bottom: 40%;
      width: 60px;
      height: 120px;
    }

    .trunk {
      width: 20px;
      height: 60px;
      background: #5c3a1e;
      margin: auto;
    }

    .leaves {
      width: 80px;
      height: 80px;
      background: radial-gradient(circle, #2e8b57 40%, #145214);
      border-radius: 50%;
      margin-left: -10px;
      margin-top: -20px;
    }

    .bench {
      position: absolute;
      bottom: 42%;
      left: 50%;
      transform: translateX(-50%);
      width: 150px;
      height: 20px;
      background: #8b5a2b;
      border-radius: 4px;
    }

    .bench::before {
      content: "";
      position: absolute;
      top: 20px;
      left: 10px;
      width: 10px;
      height: 30px;
      background: #5c3a1e;
    }

    .bench::after {
      content: "";
      position: absolute;
      top: 20px;
      right: 10px;
      width: 10px;
      height: 30px;
      background: #5c3a1e;
    }

  </style>
</head>
<body>

<div id="ground"></div>

<div class="tree" style="left: 20%;">
  <div class="leaves"></div>
  <div class="trunk"></div>
</div>

<div class="tree" style="left: 75%;">
  <div class="leaves"></div>
  <div class="trunk"></div>
</div>

<div class="bench"></div>

<script>
// Optional wind effect
let ground = document.getElementById("ground");
let offset = 0;

function animate() {
  offset += 0.5;
  ground.style.backgroundPosition = offset + "px 0px";
  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
